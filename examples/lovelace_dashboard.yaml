type: vertical-stack
cards:
  - type: entities
    title: Webasto Unite Control
    show_header_toggle: false
    entities:
      - entity: select.webasto_unite_charge_mode
        name: Charge mode
      - entity: sensor.webasto_unite_operating_state
        name: Charging behavior
      - entity: sensor.webasto_unite_effective_mode
        name: Active mode
      - entity: switch.webasto_unite_charging_allowed
        name: Allow charging
      - entity: switch.webasto_unite_pv_until_unplug
        name: PV until unplug
      - entity: switch.webasto_unite_fixed_current_until_unplug
        name: Fixed Current until Unplug
      - entity: number.webasto_unite_current_limit
        name: Current limit
      - entity: number.webasto_unite_fixed_current
        name: Fixed Current

  - type: glance
    title: Webasto Unite Status
    entities:
      - entity: binary_sensor.webasto_unite_vehicle_connected
        name: Vehicle
      - entity: binary_sensor.webasto_unite_charging_enabled
        name: Charging
      - entity: binary_sensor.webasto_unite_connected
        name: Modbus
      - entity: binary_sensor.webasto_unite_keepalive_overdue
        name: Keepalive

  - type: entities
    title: Webasto Unite Live Metrics
    show_header_toggle: false
    entities:
      - entity: sensor.webasto_unite_active_power
        name: Active power
      - entity: sensor.webasto_unite_actual_current
        name: Max phase current
      - entity: sensor.webasto_unite_session_energy
        name: Session energy
      - entity: sensor.webasto_unite_session_duration
        name: Session duration
      - entity: sensor.webasto_unite_energy_meter
        name: Energy meter

  - type: entities
    title: Webasto Unite Control Logic
    show_header_toggle: false
    entities:
      - entity: sensor.webasto_unite_dlb_limit
        name: DLB limit
      - entity: sensor.webasto_unite_final_target
        name: Final target
      - entity: sensor.webasto_unite_control_reason
        name: Control reason
      - entity: sensor.webasto_unite_dominant_limit
        name: Dominant limit
      - entity: sensor.webasto_unite_fallback_active
        name: Fallback active

  - type: entities
    title: Webasto Unite Three-Phase Detail
    show_header_toggle: false
    entities:
      - entity: sensor.webasto_unite_active_power_l1
        name: Active power L1
      - entity: sensor.webasto_unite_active_power_l2
        name: Active power L2
      - entity: sensor.webasto_unite_active_power_l3
        name: Active power L3
      - entity: sensor.webasto_unite_voltage_l1
        name: Voltage L1
      - entity: sensor.webasto_unite_voltage_l2
        name: Voltage L2
      - entity: sensor.webasto_unite_voltage_l3
        name: Voltage L3

  - type: entities
    title: Webasto Unite Diagnostics
    show_header_toggle: false
    entities:
      - entity: sensor.webasto_unite_firmware_version
        name: Firmware version
      - entity: sensor.webasto_unite_charge_point_phases
        name: Charge point phases
      - entity: sensor.webasto_unite_keepalive_age
        name: Keepalive age
      - entity: sensor.webasto_unite_keepalive_sent_count
        name: Keepalive sent count
      - entity: sensor.webasto_unite_keepalive_write_failures
        name: Keepalive write failures
      - entity: sensor.webasto_unite_pending_write
        name: Pending write
      - entity: sensor.webasto_unite_client_error
        name: Client error
