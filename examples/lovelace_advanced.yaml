type: vertical-stack
cards:
  - type: entities
    title: Webasto Unite Control
    show_header_toggle: false
    entities:
      - entity: switch.webasto_unite_charging_allowed
        name: Charging Enabled
      - entity: select.webasto_unite_charge_mode
        name: Charge Mode
      - entity: sensor.webasto_unite_operating_state
        name: Charging Behavior
      - entity: sensor.webasto_unite_effective_mode
        name: Active Mode
      - entity: switch.webasto_unite_solar_until_unplug
        name: Solar Until Unplug
      - entity: switch.webasto_unite_fixed_current_until_unplug
        name: Fixed Current Until Unplug
      - entity: number.webasto_unite_fixed_current
        name: Fixed Current

  - type: entities
    title: Live Metrics
    show_header_toggle: false
    entities:
      - entity: sensor.webasto_unite_active_power
        name: Active Power
      - entity: sensor.webasto_unite_actual_current
        name: Actual Phase Current
      - entity: sensor.webasto_unite_session_energy
        name: Session Energy
      - entity: sensor.webasto_unite_energy_meter
        name: Energy Meter
      - entity: sensor.webasto_unite_session_duration
        name: Session Duration

  - type: entities
    title: Current Limiting
    show_header_toggle: false
    entities:
      - entity: sensor.webasto_unite_final_target
        name: Final Target
      - entity: sensor.webasto_unite_dlb_limit
        name: DLB Limit
      - entity: sensor.webasto_unite_actual_current
        name: Actual Phase Current
      - entity: sensor.webasto_unite_control_reason
        name: Control Reason
      - entity: sensor.webasto_unite_dominant_limit
        name: Dominant Limit
      - entity: sensor.webasto_unite_fallback_active
        name: Fallback Active

  - type: entities
    title: Solar
    show_header_toggle: false
    entities:
      - entity: sensor.webasto_unite_solar_surplus_input
        name: Solar Surplus Input
      - entity: sensor.webasto_unite_solar_raw_input
        name: Solar Raw Input
      - entity: sensor.webasto_unite_solar_filtered_input
        name: Solar Filtered Input
      - entity: sensor.webasto_unite_solar_target
        name: Solar Target
      - entity: sensor.webasto_unite_solar_input_state
        name: Solar Input State

  - type: entities
    title: Manual Phase Switching
    show_header_toggle: false
    entities:
      - entity: sensor.webasto_unite_requested_phase
        name: Requested Phase
      - entity: sensor.webasto_unite_observed_phase
        name: Observed Phase
      - entity: sensor.webasto_unite_phase_recovery_state
        name: Phase Recovery State
      - entity: select.webasto_unite_phase_switch
        name: Phase Switch
      - entity: button.webasto_unite_request_1p_mode
        name: Switch to 1P
      - entity: button.webasto_unite_request_3p_mode
        name: Switch to 3P
      - entity: button.webasto_unite_restore_default_phase_mode
        name: Restore Configured Phase

  - type: entities
    title: Phase Details
    show_header_toggle: false
    entities:
      - entity: sensor.webasto_unite_observed_phase
        name: Observed Phase
      - entity: sensor.webasto_unite_active_power_l1
        name: Active Power L1
      - entity: sensor.webasto_unite_active_power_l2
        name: Active Power L2
      - entity: sensor.webasto_unite_active_power_l3
        name: Active Power L3
      - entity: sensor.webasto_unite_current_l1
        name: Current L1
      - entity: sensor.webasto_unite_current_l2
        name: Current L2
      - entity: sensor.webasto_unite_current_l3
        name: Current L3
      - entity: sensor.webasto_unite_voltage_l1
        name: Voltage L1
      - entity: sensor.webasto_unite_voltage_l2
        name: Voltage L2
      - entity: sensor.webasto_unite_voltage_l3
        name: Voltage L3
