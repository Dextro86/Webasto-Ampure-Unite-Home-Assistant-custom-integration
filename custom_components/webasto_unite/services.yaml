
set_mode:
  name: Set Charge Mode
  description: Set the active Charge Mode for a configured Webasto Unite integration entry.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
    mode:
      name: Mode
      description: Charge Mode to apply. Use off, normal, fixed_current, eco_solar, smart_solar or solar_boost.
      required: true
      example: "smart_solar"
set_max_current:
  name: Set Maximum Current
  description: Set the configured Maximum Current limit used as the upper bound for integration and external control.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
    current_a:
      name: Current
      description: Maximum allowed current in amperes.
      required: true
      example: 20
set_current:
  name: Set External Requested Current
  description: Set the active requested charging current in External Controller mode. Use 0 A to pause charging.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
    current_a:
      name: Current
      description: Requested charging current in amperes. Fractional values are accepted and rounded to the nearest whole ampere before writing to the charger.
      required: true
      example: 6.82
trigger_reconnect:
  name: Reconnect Charger
  description: Reconnect the Modbus/TCP client and refresh charger state.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
soft_reset_charger:
  name: Soft Reset Charger
  description: Explicitly request a WebUI soft reset/reboot of the charger. Requires REST Diagnostics credentials. This is never run automatically.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
enable_solar_until_unplug:
  name: Enable Solar Until Unplug
  description: Temporarily use solar charging until the vehicle is unplugged.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
disable_solar_until_unplug:
  name: Disable Solar Until Unplug
  description: Disable the temporary Solar Until Unplug override.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
enable_fixed_current_until_unplug:
  name: Enable Fixed Current Until Unplug
  description: Temporarily use Fixed Current charging until the vehicle is unplugged.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
disable_fixed_current_until_unplug:
  name: Disable Fixed Current Until Unplug
  description: Disable the temporary Fixed Current Until Unplug override.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
request_phase_1p:
  name: Switch to 1P
  description: Experimental explicit phase switch request to 1P. Available when Phase Switching Mode is not Off and register 405 is available.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
request_phase_3p:
  name: Switch to 3P
  description: Experimental explicit phase switch request to 3P. Available when Phase Switching Mode is not Off and register 405 is available.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
restore_default_phase:
  name: Restore Configured Phase
  description: Restore the phase mode derived from Charger Configuration. Requires a connected vehicle; without a connected vehicle only the runtime phase override state is cleared.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
reset_phase_switch_state:
  name: Reset Phase Switch State
  description: Clear the diagnostic state of the experimental phase switching helper.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
