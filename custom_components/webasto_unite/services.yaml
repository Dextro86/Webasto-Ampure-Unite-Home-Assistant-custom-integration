
set_mode:
  name: Set Charge Mode
  description: Set the active Charge Mode for a configured Webasto Unite integration entry.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
    mode:
      name: Mode
      description: Charge Mode to apply. Use off, normal, fixed_current, eco_solar, smart_solar or solar_boost.
      required: true
      example: "smart_solar"
set_max_current:
  name: Set Maximum Current
  description: Set the configured Maximum Current limit used as the upper bound for integration and external control.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
    current_a:
      name: Current
      description: Maximum allowed current in amperes.
      required: true
      example: 20
set_current:
  name: Set External Requested Current
  description: Set the active requested charging current in External Controller mode. Use 0 A to pause charging.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
    current_a:
      name: Current
      description: Requested charging current in amperes.
      required: true
      example: 20
set_user_limit:
  name: Set Maximum Current
  description: Legacy service alias. Sets the configured Maximum Current limit.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
    current_a:
      name: Current
      description: Maximum Current in amperes.
      required: true
      example: 10
trigger_reconnect:
  name: Reconnect Charger
  description: Reconnect the Modbus/TCP client and refresh charger state.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
enable_solar_until_unplug:
  name: Enable Solar Until Unplug
  description: Temporarily use solar charging until the vehicle is unplugged.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
disable_solar_until_unplug:
  name: Disable Solar Until Unplug
  description: Disable the temporary Solar Until Unplug override.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
enable_fixed_current_until_unplug:
  name: Enable Fixed Current Until Unplug
  description: Temporarily use Fixed Current charging until the vehicle is unplugged.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
disable_fixed_current_until_unplug:
  name: Disable Fixed Current Until Unplug
  description: Disable the temporary Fixed Current Until Unplug override.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
request_phase_1p:
  name: Request 1P Phase Mode
  description: Experimental manual phase switch request to 1P. Requires Phase Switching Mode to be Manual Only. Writes and verifies register 405.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
request_phase_3p:
  name: Request 3P Phase Mode
  description: Experimental manual phase switch request to 3P. Requires Phase Switching Mode to be Manual Only. Writes and verifies register 405.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
restore_default_phase:
  name: Restore Default Phase Mode
  description: Restore the phase mode derived from Charger Configuration. Requires Phase Switching Mode to be Manual Only. Can run without a connected vehicle.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
reset_phase_switch_state:
  name: Reset Phase Switch State
  description: Clear the diagnostic state of the experimental manual phase switching helper.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
