
set_mode:
  name: Set Charge Mode
  description: Set the active Charge Mode for a configured Webasto Unite integration entry.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
    mode:
      name: Mode
      description: Charge Mode to apply.
      required: true
      example: "solar"
set_user_limit:
  name: Set Current Limit
  description: Set the default Current Limit used by normal charging mode.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
    current_a:
      name: Current
      description: Current Limit in amperes.
      required: true
      example: 10
trigger_reconnect:
  name: Reconnect Charger
  description: Reconnect the Modbus/TCP client and refresh charger state.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
enable_solar_until_unplug:
  name: Enable Solar Until Unplug
  description: Temporarily use solar charging until the vehicle is unplugged.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
disable_solar_until_unplug:
  name: Disable Solar Until Unplug
  description: Disable the temporary Solar Until Unplug override.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
enable_pv_until_unplug:
  name: Enable PV Until Unplug
  description: Legacy alias for Enable Solar Until Unplug.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
disable_pv_until_unplug:
  name: Disable PV Until Unplug
  description: Legacy alias for Disable Solar Until Unplug.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
enable_fixed_current_until_unplug:
  name: Enable Fixed Current Until Unplug
  description: Temporarily use Fixed Current charging until the vehicle is unplugged.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
disable_fixed_current_until_unplug:
  name: Disable Fixed Current Until Unplug
  description: Disable the temporary Fixed Current Until Unplug override.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the Webasto Unite integration instance.
      required: true
      example: "abc123"
